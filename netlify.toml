[build]
  command = "# no build needed"
  publish = "."

# Redirect for clean privacy URL
[[redirects]]
  from = "/privacy"
  to = "/privacy/index.html"
  status = 200

# Proper headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "*.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
